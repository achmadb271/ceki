<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Score Tracker 1000</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen pb-24 font-sans">
  
  <div class="max-w-md mx-auto p-2">
    <!-- Banner Pengumuman -->
    <div id="winner-banner" class="hidden bg-green-500 text-white p-4 rounded-lg shadow-lg mb-4 text-center transition-all">
    </div>

    <!-- Tabel Skor -->
    <div class="bg-slate-800/50 rounded-xl overflow-hidden shadow-xl border border-slate-700">
      <table class="w-full table-fixed border-collapse">
        <thead>
          <tr class="bg-slate-800 border-b border-slate-700">
            <th class="w-10 p-2 text-center text-slate-300 text-sm">R</th>
            <th class="p-1"><input type="text" class="name-input w-full bg-transparent text-center font-bold text-slate-300 focus:outline-none focus:bg-slate-700 focus:text-white rounded p-1" data-player="p1"></th>
            <th class="p-1"><input type="text" class="name-input w-full bg-transparent text-center font-bold text-slate-300 focus:outline-none focus:bg-slate-700 focus:text-white rounded p-1" data-player="p2"></th>
            <th class="p-1"><input type="text" class="name-input w-full bg-transparent text-center font-bold text-slate-300 focus:outline-none focus:bg-slate-700 focus:text-white rounded p-1" data-player="p3"></th>
            <th class="p-1"><input type="text" class="name-input w-full bg-transparent text-center font-bold text-slate-300 focus:outline-none focus:bg-slate-700 focus:text-white rounded p-1" data-player="p4"></th>
          </tr>
        </thead>
        <tbody id="score-body">
          <!-- Baris Ronde -->
        </tbody>
        <tfoot id="score-foot">
          <!-- Baris Total -->
        </tfoot>
      </table>
    </div>

    <!-- Tombol Kontrol -->
    <div class="mt-6 flex gap-3">
      <button id="btn-add" class="flex-1 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-colors">
        + Tambah Ronde
      </button>
      <button id="btn-reset" class="bg-red-900/50 hover:bg-red-800 text-red-200 font-semibold py-3 px-4 rounded-lg border border-red-800 transition-colors">
        Reset
      </button>
    </div>
  </div>

  <script>
    const SCORE_KEY = 'score_tracker_state';
    const NAME_KEY = 'score_tracker_names';

    let state = JSON.parse(localStorage.getItem(SCORE_KEY)) || [{ p1: '', p2: '', p3: '', p4: '' }];
    let playerNames = JSON.parse(localStorage.getItem(NAME_KEY)) || { p1: 'P1', p2: 'P2', p3: 'P3', p4: 'P4' };
    const players = ['p1', 'p2', 'p3', 'p4'];

    const tbody = document.getElementById('score-body');
    const tfoot = document.getElementById('score-foot');
    const btnAdd = document.getElementById('btn-add');
    const btnReset = document.getElementById('btn-reset');
    const winnerBanner = document.getElementById('winner-banner');

    // Setup Input Nama
    document.querySelectorAll('.name-input').forEach(input => {
      const playerKey = input.getAttribute('data-player');
      input.value = playerNames[playerKey];
      
      input.addEventListener('input', (e) => {
        playerNames[playerKey] = e.target.value || playerKey.toUpperCase();
        localStorage.setItem(NAME_KEY, JSON.stringify(playerNames));
        renderFooter(); 
      });
    });

    function saveState() {
      localStorage.setItem(SCORE_KEY, JSON.stringify(state));
    }

    function calculateTotals() {
      return state.reduce((acc, row) => {
        acc.p1 += parseInt(row.p1) || 0;
        acc.p2 += parseInt(row.p2) || 0;
        acc.p3 += parseInt(row.p3) || 0;
        acc.p4 += parseInt(row.p4) || 0;
        return acc;
      }, { p1: 0, p2: 0, p3: 0, p4: 0 });
    }

    function renderTable() {
      tbody.innerHTML = '';
      state.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.className = "border-b border-slate-700/50";
        tr.innerHTML = `
          <td class="p-1 text-center text-xs font-bold text-slate-500">${index + 1}</td>
          <td class="p-1"><input type="number" data-idx="${index}" data-player="p1" value="${row.p1}" class="score-input w-full bg-slate-800/80 text-white text-center p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"></td>
          <td class="p-1"><input type="number" data-idx="${index}" data-player="p2" value="${row.p2}" class="score-input w-full bg-slate-800/80 text-white text-center p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"></td>
          <td class="p-1"><input type="number" data-idx="${index}" data-player="p3" value="${row.p3}" class="score-input w-full bg-slate-800/80 text-white text-center p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"></td>
          <td class="p-1"><input type="number" data-idx="${index}" data-player="p4" value="${row.p4}" class="score-input w-full bg-slate-800/80 text-white text-center p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderFooter() {
      const totals = calculateTotals();
      
      // 1. Cek apakah ada yang tembus 1000
      const hasReached1000 = players.some(p => totals[p] >= 1000);
      
      // 2. Cek apakah ronde terakhir sudah diisi semua
      const lastRow = state[state.length - 1];
      const isCurrentRoundFinished = lastRow.p1 !== '' && lastRow.p2 !== '' && lastRow.p3 !== '' && lastRow.p4 !== '';
      
      // Game Over JIKA ada yang tembus 1000 DAN ronde sudah selesai
      const isGameOver = hasReached1000 && isCurrentRoundFinished;

      let winners = [];
      let losers = [];
      let minScore = 0;

      if (isGameOver) {
        winners = players.filter(p => totals[p] >= 1000);
        minScore = Math.min(totals.p1, totals.p2, totals.p3, totals.p4);
        losers = players.filter(p => totals[p] === minScore);
      }

      // Fungsi untuk menentukan warna teks di Footer
      const getColor = (player) => {
        if (!isGameOver) return 'text-white'; // Normal saat main
        if (winners.includes(player)) return 'text-green-400 font-black'; // Pemenang hijau
        if (losers.includes(player)) return 'text-red-400'; // Terbawah merah
        return 'text-slate-400'; // Sisanya abu-abu
      };

      tfoot.innerHTML = `
        <tr class="bg-slate-900 font-bold text-xl sticky bottom-0 border-t-2 border-slate-600 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.5)] transition-colors">
          <td class="p-3 text-center text-blue-400 text-sm">TOT</td>
          <td class="p-3 text-center ${getColor('p1')}">${totals.p1}</td>
          <td class="p-3 text-center ${getColor('p2')}">${totals.p2}</td>
          <td class="p-3 text-center ${getColor('p3')}">${totals.p3}</td>
          <td class="p-3 text-center ${getColor('p4')}">${totals.p4}</td>
        </tr>
      `;

      // Render Banner jika Game Over
      if (isGameOver) {
        const winnerDisplay = winners.map(w => playerNames[w]).join(' & ');
        const loserDisplay = losers.map(l => playerNames[l]).join(' & ');
        
        winnerBanner.classList.remove('hidden');
        winnerBanner.innerHTML = `
          <div class="text-2xl font-black mb-1">🏆 ${winnerDisplay} Menang!</div>
          <div class="text-sm bg-slate-900/40 text-white inline-block px-4 py-1.5 rounded-full mt-2 border border-slate-800">
            Skor Terendah: <span class="text-red-300 font-bold">${loserDisplay} (${minScore})</span>
          </div>
        `;
        
        document.querySelectorAll('.score-input').forEach(input => input.disabled = true);
        btnAdd.disabled = true;
        btnAdd.classList.add('opacity-50', 'cursor-not-allowed');
      } else {
        winnerBanner.classList.add('hidden');
        document.querySelectorAll('.score-input').forEach(input => input.disabled = false);
        btnAdd.disabled = false;
        btnAdd.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }

    tbody.addEventListener('input', (e) => {
      if (e.target.classList.contains('score-input')) {
        const index = e.target.getAttribute('data-idx');
        const player = e.target.getAttribute('data-player');
        
        state[index][player] = e.target.value;
        saveState();
        renderFooter();
      }
    });

    btnAdd.addEventListener('click', () => {
      state.push({ p1: '', p2: '', p3: '', p4: '' });
      saveState();
      renderTable();
      renderFooter();
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    btnReset.addEventListener('click', () => {
      if(confirm('Yakin mau reset skor? (Nama player aman)')) {
        state = [{ p1: '', p2: '', p3: '', p4: '' }];
        saveState();
        renderTable();
        renderFooter();
      }
    });

    renderTable();
    renderFooter();
  </script>
</body>
</html>
